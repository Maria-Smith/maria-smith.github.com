<!DOCTYPE html>
<html>
<head>
  <title>24h Clock</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; }
    canvas { border: 1px solid #333; }
  </style>
</head>
<body>
  <canvas id="clock" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById('clock');
    const ctx = canvas.getContext('2d');
    const radius = 150;
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    // Default sleep schedule (3am–noon)
    let sleepStart = 3; // hours
    let wakeTime = 12; // hours

    function drawClock() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();
      const currentHour = hours + minutes / 60 + seconds / 3600;

      // Clear canvas
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw sleep period (3am–noon = 3–12)
      ctx.fillStyle = 'rgba(255, 200, 100, 0.2)';
      drawArc(wakeTime, sleepStart + 24); // wraps around midnight

      // Draw awake period (noon–3am = 12–27 on 24h scale)
      ctx.fillStyle = 'rgba(100, 150, 255, 0.2)';
      drawArc(sleepStart + 24, wakeTime + 24);

      // Draw current time indicator
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
      ctx.fill();

      // Draw hour hand
      const angleHour = (currentHour / 24) * Math.PI * 2 - Math.PI / 2;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX + Math.cos(angleHour) * (radius * 0.7), centerY + Math.sin(angleHour) * (radius * 0.7));
      ctx.stroke();

      // Draw numbers 0–23
      ctx.fillStyle = '#999';
      ctx.font = '12px Consolas';
      ctx.textAlign = 'center';
      for (let i = 0; i < 24; i++) {
        const angle = (i / 24) * Math.PI * 2 - Math.PI / 2;
        const x = centerX + Math.cos(angle) * (radius - 20);
        const y = centerY + Math.sin(angle) * (radius - 20);
        ctx.fillText(i, x, y + 4);
      }

      ctx.fillText(now.toLocaleTimeString('cs'), centerX, centerY + radius + 20);
      ctx.fillText(now.toLocaleDateString('cs'), centerX, centerY + radius + 40);

      ctx.beginPath();
      ctx.lineWidth = 1;
      ctx.strokeStyle = '#999';
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawArc(start, end) {
      const startAngle = (start / 24) * Math.PI * 2 - Math.PI / 2;
      const endAngle = (end / 24) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.arc(centerX, centerY, radius, startAngle, endAngle);
      ctx.closePath();
      ctx.fill();
    }

    setInterval(drawClock, 1000);
    drawClock();
  </script>
</body>
</html>
