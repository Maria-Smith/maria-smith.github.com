<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Clock</title>
  <style>
    body { 
      margin: 0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      background: #1a1a1a; 
      font-family: Consolas, monospace;
    }
    #clockContainer {
      width: 90vmin;
      height: 90vmin;
      max-width: 600px;
      max-height: 600px;
    }
    #clock {
        image-rendering: pixelated;
    }
    canvas { 
      border: 1px solid #333; 
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="clockContainer">
    <canvas id="clock"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('clock');
    const ctx = canvas.getContext('2d');
    let radius = 150;
    let centerX = canvas.width / 2;
    let centerY = canvas.height / 2;

    // Default sleep schedule (3am–noon)
    let sleepStart = 3; // hours
    let wakeTime = 12; // hours

    function resizeCanvas() {
      const container = document.getElementById('clockContainer');
      const size = Math.min(container.offsetWidth, container.offsetHeight);
      canvas.width = size;
      canvas.height = size;
      radius = size * 0.375;
      centerX = canvas.width / 2;
      centerY = canvas.height / 2;
    }

    function getPragueTime() {
      const now = new Date();
      const pragueTz = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Prague' }));
      return {
        hours: pragueTz.getHours(),
        minutes: pragueTz.getMinutes(),
        seconds: pragueTz.getSeconds(),
        date: pragueTz
      };
    }

    function drawClock() {
      const time = getPragueTime();
      const hours = time.hours;
      const minutes = time.minutes;
      const seconds = time.seconds;
      const now = time.date;
      const currentHour = hours + minutes / 60 + seconds / 3600;

      // Clear canvas
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw sleep period (3am–noon = 3–12)
      ctx.fillStyle = 'rgba(100, 200, 100, 0.2)';
      drawArc(wakeTime, sleepStart + 24); // wraps around midnight
      
      // Draw awake period (noon–3am = 12–27 on 24h scale)
      ctx.fillStyle = 'rgba(50, 120, 50, 0.2)';
      drawArc(sleepStart + 24, wakeTime + 24);

      // Draw current time indicator
      ctx.fillStyle = '#99ff00';
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius * 0.033, 0, Math.PI * 2);
      ctx.fill();

      // Draw hour hand
      const angleHour = (currentHour / 24) * Math.PI * 2 - Math.PI / 2;
      ctx.strokeStyle = '#99ff00';
      ctx.lineWidth = Math.max(3, radius * 0.02);
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX + Math.cos(angleHour) * (radius * 0.7), centerY + Math.sin(angleHour) * (radius * 0.7));
      ctx.stroke();

      // Draw numbers 0–23
      ctx.fillStyle = '#99dd44';
      const fontSize = Math.max(12, radius * 0.08);
      ctx.font = fontSize + 'px Consolas';
      ctx.textAlign = 'center';
      for (let i = 0; i < 24; i++) {
        const angle = (i / 24) * Math.PI * 2 - Math.PI / 2;
        const x = centerX + Math.cos(angle) * (radius - fontSize);
        const y = centerY + Math.sin(angle) * (radius - fontSize);
        ctx.fillText(i, x, y + fontSize * 0.3);
      }

      ctx.fillText(now.toLocaleTimeString('cs'), centerX, centerY + fontSize * 2);
      ctx.fillText(now.toLocaleDateString('cs'), centerX, centerY + fontSize * 3);

      ctx.fillText("Please consult the Glock", centerX, centerY - radius - fontSize);

      // Calculate remaining awake hours and percentage
      const totalAwakeHours = wakeTime <= sleepStart ? 
        (24 - sleepStart + wakeTime) : 
        (wakeTime - sleepStart);
      
      let remainingHours;
      if (currentHour >= wakeTime) {
        remainingHours = (sleepStart + 24) - currentHour;
      } else if (currentHour < sleepStart) {
        // Still in sleep period, show hours until next wake
        remainingHours = wakeTime - currentHour;
      } else {
        remainingHours = sleepStart - currentHour;
      }
      
      const percentageRemaining = (remainingHours / totalAwakeHours) * 100;
      const remainingMins = Math.floor((remainingHours % 1) * 60);
      const remainingHoursPart = Math.floor(remainingHours);
      
      ctx.fillStyle = '#99dd44';
      ctx.font = (fontSize * 0.8) + 'px Consolas';
      ctx.textAlign = 'center';
      ctx.fillText(`Remaining: ${remainingHoursPart}h ${remainingMins}m (${percentageRemaining.toFixed(1)}%)`, centerX, centerY + radius + fontSize * 2.5);

      ctx.beginPath();
      ctx.lineWidth = 1;
      ctx.strokeStyle = '#99aa44';
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawArc(start, end) {
      const startAngle = (start / 24) * Math.PI * 2 - Math.PI / 2;
      const endAngle = (end / 24) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.arc(centerX, centerY, radius, startAngle, endAngle);
      ctx.closePath();
      ctx.fill();
    }

    // Initialize
    resizeCanvas();
    setInterval(drawClock, 1000);
    drawClock();

    // Handle window resize
    window.addEventListener('resize', () => {
      resizeCanvas();
      drawClock();
    });
  </script>
</body>
</html>
